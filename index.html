<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANON_PROTOCOL // V3</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --me-bg: #0A84FF; /* Apple iMessage Blue */
            --stranger-bg: #2C2C2E; /* iOS Dark Gray */
            --sys-text: #8E8E93;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(0, 0, 0, 0.75);
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; /* 將整個畫面置中 */
            overflow: hidden;
        }

        /* 集中視窗設定 */
        #app-container {
            width: 100%;
            max-width: 600px; /* 限制最大寬度，讓視線集中 */
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* 頂部毛玻璃導覽列 */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: absolute;
            top: 0; left: 0; right: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: #34C759;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px rgba(52, 199, 89, 0.6);
        }

        /* 聊天流 */
        #chat-flow {
            flex: 1;
            padding: 80px 20px 100px 20px; /* 留出 header 和 footer 空間 */
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 0px; } /* 隱藏滾動條以求極簡 */

        /* 訊息氣泡與動畫 */
        .msg-wrapper {
            display: flex;
            flex-direction: column;
            animation: spring-up 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
            transform-origin: bottom;
        }

        @keyframes spring-up {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg {
            max-width: 75%;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.4;
            border-radius: 20px;
            position: relative;
            word-break: break-word;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .msg:active { opacity: 0.7; }

        /* 回覆區塊樣式 */
        .reply-quote {
            font-size: 12px;
            background: rgba(0,0,0,0.2);
            padding: 6px 10px;
            border-radius: 10px;
            margin-bottom: 6px;
            border-left: 3px solid rgba(255,255,255,0.5);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 圖片樣式 */
        .msg img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
        }

        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.me .msg {
            background-color: var(--me-bg);
            color: var(--fg);
            border-bottom-right-radius: 4px;
        }

        .msg-wrapper.stranger { align-items: flex-start; }
        .msg-wrapper.stranger .msg {
            background-color: var(--stranger-bg);
            color: var(--fg);
            border-bottom-left-radius: 4px;
        }

        .msg-wrapper.system {
            align-items: center;
            font-size: 12px;
            color: var(--sys-text);
            margin: 15px 0;
            font-weight: 500;
        }

        /* 正在輸入狀態 */
        #typing-indicator {
            align-self: flex-start;
            background: var(--stranger-bg);
            padding: 12px 16px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            display: none;
            align-items: center;
            gap: 4px;
            animation: fade-in 0.3s forwards;
            margin-bottom: 10px;
        }
        #typing-indicator.active { display: flex; }
        
        .dot {
            width: 6px; height: 6px;
            background: var(--sys-text);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

        /* 底部輸入區域毛玻璃 */
        footer {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 10px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        footer.hidden { transform: translateY(100%); }

        /* 回覆預覽列 */
        #reply-preview {
            display: none;
            justify-content: space-between;
            align-items: center;
            background: var(--stranger-bg);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 10px;
            color: var(--sys-text);
        }
        #reply-preview.active { display: flex; animation: fade-in 0.2s; }
        #cancel-reply { cursor: pointer; color: var(--fg); font-weight: bold; }

        .input-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 圖片上傳按鈕 */
        .btn-icon {
            background: none;
            border: none;
            color: var(--sys-text);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .btn-icon:hover { color: var(--fg); }

        .input-wrapper {
            flex: 1;
            background: var(--stranger-bg);
            border-radius: 20px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]::placeholder { color: var(--sys-text); }
        input[type="file"] { display: none; }

    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="status-dot" id="dot"></div>
        <span id="status-text">Connecting...</span>
    </header>

    <main id="chat-flow">
        <div id="typing-indicator">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="msg-wrapper system" id="sys-msg">Initializing end-to-end anonymity...</div>
    </main>

    <footer id="input-wrap" class="hidden">
        <div id="reply-preview">
            <span id="reply-text">Replying to...</span>
            <span id="cancel-reply">✕</span>
        </div>
        <div class="input-bar">
            <button class="btn-icon" onclick="document.getElementById('file-input').click()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </button>
            <input type="file" id="file-input" accept="image/*">
            
            <div class="input-wrapper">
                <input type="text" id="m-input" placeholder="Message..." autocomplete="off">
            </div>
        </div>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect, remove, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhH-mST6_gPbOCJxFhJBe9FSK-iVYPmpw",
        authDomain: "plchat-69b04.firebaseapp.com",
        databaseURL: "https://plchat-69b04-default-rtdb.firebaseio.com",
        projectId: "plchat-69b04",
        storageBucket: "plchat-69b04.firebasestorage.app",
        messagingSenderId: "131639913861",
        appId: "1:131639913861:web:c5c07002169470961668ec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const myId = Math.random().toString(36).substring(7);
    let currentRoomId = null;
    let replyTarget = null; // 儲存目前要回覆的訊息內容

    // DOM Elements
    const statusText = document.getElementById('status-text');
    const dot = document.getElementById('dot');
    const flowEl = document.getElementById('chat-flow');
    const inputWrap = document.getElementById('input-wrap');
    const inputEl = document.getElementById('m-input');
    const fileInput = document.getElementById('file-input');
    const typingIndicator = document.getElementById('typing-indicator');
    const replyPreview = document.getElementById('reply-preview');
    const replyText = document.getElementById('reply-text');

    async function startMatch() {
        dot.style.background = '#FF9500'; // 橘色表示尋找中
        statusText.innerText = 'Searching for stranger...';
        
        const poolRef = ref(db, 'waiting_pool');
        const snapshot = await get(poolRef);
        
        if (snapshot.exists()) {
            const waiters = snapshot.val();
            const opponentId = Object.keys(waiters)[0];
            currentRoomId = waiters[opponentId].roomId;
            await remove(ref(db, `waiting_pool/${opponentId}`));
            await push(ref(db, `rooms/${currentRoomId}/messages`), { sender: "sys_sync", text: "1" });
            beginChat(currentRoomId);
        } else {
            currentRoomId = `room_${myId}`;
            await set(ref(db, `waiting_pool/${myId}`), { roomId: currentRoomId });
            onDisconnect(ref(db, `waiting_pool/${myId}`)).remove();
            
            const syncRef = ref(db, `rooms/${currentRoomId}/messages`);
            const unsubscribe = onValue(syncRef, (snap) => {
                if (snap.exists()) {
                    unsubscribe();
                    beginChat(currentRoomId);
                }
            });
        }
    }

    function beginChat(roomId) {
        dot.style.background = '#34C759'; // 綠色表示已連線
        statusText.innerText = "Stranger Connected";
        document.getElementById('sys-msg').style.display = 'none';
        inputWrap.classList.remove('hidden');
        
        const roomRef = ref(db, `rooms/${roomId}`);
        onDisconnect(roomRef).remove(); // 關閉自動刪除房間

        // 監聽訊息
        onValue(ref(db, `rooms/${roomId}/messages`), (snap) => {
            if (!snap.exists()) { 
                // 房間消失 = 對方離開
                alert("Stranger has disconnected. Finding a new one...");
                location.reload(); 
                return; 
            }
            const msgList = Object.values(snap.val()).filter(m => m.sender !== "sys_sync");
            updateUI(msgList.slice(-30));
        });

        // 監聽對方打字狀態
        onValue(ref(db, `rooms/${roomId}/typing`), (snap) => {
            if (snap.exists()) {
                const typers = snap.val();
                const opponentTyping = Object.keys(typers).some(id => id !== myId && typers[id] === true);
                opponentTyping ? typingIndicator.classList.add('active') : typingIndicator.classList.remove('active');
            }
        });
    }

    // 渲染 UI (支援圖片與回覆)
    function updateUI(msgs) {
        const reversed = [...msgs].reverse(); 
        
        // 保留 typing-indicator
        const typingEl = typingIndicator;
        flowEl.innerHTML = '';
        flowEl.appendChild(typingEl);

        reversed.forEach(m => {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${m.sender === myId ? 'me' : 'stranger'}`;
            
            let contentHtml = '';
            
            // 如果有回覆目標，先渲染回覆框
            if (m.replyTo) {
                const replyLabel = m.replyTo.sender === myId ? 'You' : 'Stranger';
                contentHtml += `<div class="reply-quote">${replyLabel}: ${m.replyTo.text}</div>`;
            }

            // 判斷是文字還是圖片
            if (m.type === 'image') {
                contentHtml += `<img src="${m.text}" alt="image">`;
            } else {
                contentHtml += `${m.text}`;
            }

            wrap.innerHTML = `<div class="msg" onclick="setReply('${m.sender}', \`${m.type === 'image' ? '[Image]' : m.text.replace(/`/g, '')}\`)">${contentHtml}</div>`;
            flowEl.appendChild(wrap);
        });
    }

    // 設定回覆
    window.setReply = (senderId, text) => {
        replyTarget = { sender: senderId, text: text };
        replyText.innerText = `Replying to: ${text}`;
        replyPreview.classList.add('active');
        inputEl.focus();
    };

    document.getElementById('cancel-reply').onclick = () => {
        replyTarget = null;
        replyPreview.classList.remove('active');
    };

    // 發送訊息
    async function sendMessage(text, type = 'text') {
        if (!text) return;
        const payload = {
            sender: myId,
            text: text,
            type: type,
            ts: serverTimestamp()
        };
        if (replyTarget) {
            payload.replyTo = replyTarget;
            document.getElementById('cancel-reply').click(); // 清除回覆狀態
        }
        await push(ref(db, `rooms/${currentRoomId}/messages`), payload);
        inputEl.value = '';
        setTyping(false);
    }

    // 文字輸入事件
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage(inputEl.value.trim());
    });

    // 打字狀態偵測
    let typingTimer;
    function setTyping(isTyping) {
        if (currentRoomId) set(ref(db, `rooms/${currentRoomId}/typing/${myId}`), isTyping ? true : null);
    }
    
    inputEl.addEventListener('input', () => {
        setTyping(true);
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => setTyping(false), 2000); // 2秒沒打字視為停止
    });
    inputEl.addEventListener('blur', () => setTyping(false));

    // 圖片上傳壓縮邏輯 (Canvas)
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                // 限制最大寬度以節省 Firebase 資料庫空間
                const MAX_WIDTH = 600;
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                
                // 轉為 Base64 (0.7 品質的 JPG) 並發送
                const base64Data = canvas.toDataURL('image/jpeg', 0.7);
                sendMessage(base64Data, 'image');
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
        fileInput.value = ''; // 重置 file input
    });

    startMatch();
</script>
</body>
</html>
