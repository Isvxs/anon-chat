<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANON_FOCUS // V3</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --gray: #f2f2f2;
            --accent: #888888;
            --focus-width: 550px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Builder Sans', 'Inter', system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; /* 視窗置中 */
        }

        #app-container {
            width: 100%;
            max-width: var(--focus-width);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            border-left: 1px solid var(--gray);
            border-right: 1px solid var(--gray);
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gray);
        }

        #chat-flow {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            scrollbar-width: none;
        }
        #chat-flow::-webkit-scrollbar { display: none; }

        /* 訊息氣泡 */
        .msg-wrapper {
            display: flex;
            flex-direction: column;
            animation: cubic-bezier(0.2, 1, 0.2, 1) 0.5s msg-in;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg {
            max-width: 85%;
            padding: 10px 16px;
            font-size: 15px;
            line-height: 1.4;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .msg:active { transform: scale(0.98); }

        .me { align-items: flex-end; }
        .me .msg { background: var(--fg); color: var(--bg); border-bottom-right-radius: 4px; }

        .stranger { align-items: flex-start; }
        .stranger .msg { background: var(--gray); color: var(--fg); border-bottom-left-radius: 4px; }

        /* 回覆樣式 */
        .reply-ref {
            font-size: 12px;
            padding: 4px 8px;
            border-left: 2px solid var(--accent);
            margin-bottom: 4px;
            opacity: 0.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Typing 提示 */
        #typing-indicator {
            padding: 5px 20px;
            font-size: 11px;
            color: var(--accent);
            height: 20px;
            font-style: italic;
            transition: opacity 0.3s;
        }

        /* 回覆預覽列 */
        #reply-preview {
            padding: 10px 20px;
            background: var(--gray);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer {
            padding: 20px;
            background: var(--bg);
        }

        .input-box {
            background: var(--gray);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 15px;
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

<div id="app-container">
    <header>
        <span id="status">Syncing...</span>
        <span id="log-info">0/30</span>
    </header>

    <main id="chat-flow"></main>

    <div id="typing-indicator" class="hidden">stranger is typing...</div>

    <div id="reply-preview" class="hidden">
        <span id="reply-text"></span>
        <button onclick="cancelReply()" style="border:none; background:none; cursor:pointer;">×</button>
    </div>

    <footer id="input-wrap" class="hidden">
        <div class="input-box">
            <input type="text" id="m-input" placeholder="Type message..." autocomplete="off">
        </div>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect, remove, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhH-mST6_gPbOCJxFhJBe9FSK-iVYPmpw",
        authDomain: "plchat-69b04.firebaseapp.com",
        databaseURL: "https://plchat-69b04-default-rtdb.firebaseio.com",
        projectId: "plchat-69b04",
        storageBucket: "plchat-69b04.firebasestorage.app",
        messagingSenderId: "131639913861",
        appId: "1:131639913861:web:c5c07002169470961668ec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const myId = Math.random().toString(36).substring(7);
    let currentRoomId = null;
    let replyTarget = null;
    let typingTimeout = null;

    const flowEl = document.getElementById('chat-flow');
    const inputEl = document.getElementById('m-input');
    const typingEl = document.getElementById('typing-indicator');
    const replyPre = document.getElementById('reply-preview');

    async function startMatch() {
        const poolRef = ref(db, 'waiting_pool');
        const snap = await get(poolRef);
        
        if (snap.exists()) {
            const opponentId = Object.keys(snap.val())[0];
            currentRoomId = snap.val()[opponentId].roomId;
            await remove(ref(db, `waiting_pool/${opponentId}`));
            await push(ref(db, `rooms/${currentRoomId}/messages`), { sender: "sys", text: "init" });
            initChat(currentRoomId);
        } else {
            currentRoomId = `room_${myId}`;
            await set(ref(db, `waiting_pool/${myId}`), { roomId: currentRoomId });
            onDisconnect(ref(db, `waiting_pool/${myId}`)).remove();
            const unsubscribe = onValue(ref(db, `rooms/${currentRoomId}/messages`), (s) => {
                if (s.exists()) { unsubscribe(); initChat(currentRoomId); }
            });
        }
    }

    function initChat(rid) {
        document.getElementById('status').innerText = "Established";
        document.getElementById('input-wrap').classList.remove('hidden');
        
        const roomRef = ref(db, `rooms/${rid}`);
        onDisconnect(roomRef).remove();

        // 監聽訊息
        onValue(roomRef, (snap) => {
            if (!snap.exists()) location.reload();
            const data = snap.val();
            if (data && data.messages) {
                const msgs = Object.values(data.messages).filter(m => m.sender !== "sys");
                render(msgs.slice(-30));
            }
            // 監聽對方輸入狀態
            if (data && data.typing) {
                const typingUser = Object.keys(data.typing).find(id => id !== myId);
                typingEl.classList.toggle('hidden', !typingUser);
            }
        });
    }

    function render(msgs) {
        flowEl.innerHTML = '';
        [...msgs].reverse().forEach(m => {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${m.sender === myId ? 'me' : 'stranger'}`;
            
            let replyHTML = m.replyTo ? `<div class="reply-ref">${m.replyTo}</div>` : '';
            wrap.innerHTML = `${replyHTML}<div class="msg" title="Double click to reply">${m.text}</div>`;
            
            wrap.ondblclick = () => setReply(m.text);
            flowEl.appendChild(wrap);
        });
        document.getElementById('log-info').innerText = `${msgs.length}/30`;
    }

    function setReply(text) {
        replyTarget = text;
        replyPre.classList.remove('hidden');
        document.getElementById('reply-text').innerText = `Replying to: ${text}`;
        inputEl.focus();
    }

    window.cancelReply = () => {
        replyTarget = null;
        replyPre.classList.add('hidden');
    }

    // 輸入狀態邏輯
    inputEl.oninput = () => {
        set(ref(db, `rooms/${currentRoomId}/typing/${myId}`), true);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            remove(ref(db, `rooms/${currentRoomId}/typing/${myId}`));
        }, 1500);
    };

    inputEl.onkeypress = (e) => {
        if (e.key === 'Enter' && inputEl.value.trim() !== '') {
            push(ref(db, `rooms/${currentRoomId}/messages`), {
                sender: myId,
                text: inputEl.value,
                replyTo: replyTarget,
                ts: serverTimestamp()
            });
            inputEl.value = '';
            cancelReply();
            remove(ref(db, `rooms/${currentRoomId}/typing/${myId}`));
        }
    };

    startMatch();
</script>
</body>
</html>
