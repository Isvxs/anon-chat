<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANON_CHAT // PROTOCOL</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --border: #e0e0e0;
            --system: #a0a0a0;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Builder Sans', 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        /* 頂部狀態列 */
        header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--fg);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* 聊天流區域 */
        #chat-flow {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 90%;
            padding: 2px 0;
            font-size: 14px;
            line-height: 1.6;
            border-bottom: 1px solid transparent;
        }

        /* 身份標籤風格 */
        .msg b {
            font-weight: 800;
            margin-right: 8px;
            display: inline-block;
            min-width: 70px;
        }

        .msg.me b { color: var(--fg); }
        .msg.stranger b { color: var(--system); }
        .msg.system { color: var(--system); font-size: 12px; }

        /* 輸入區域 */
        #input-wrap {
            padding: 30px 20px;
            border-top: 1px solid var(--fg);
            background: var(--bg);
        }

        #input-wrap.hidden { display: none; }

        .input-line {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-line span { font-weight: 800; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            padding: 5px 0;
        }

        /* 滾動條 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--fg); }

        /* 等待動畫 */
        .loading::after {
            content: '...';
            animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<header>
    <div id="status">Protocol: <span class="loading">Initializing</span></div>
    <div id="log-count">Log: 0/30</div>
</header>

<main id="chat-flow">
    <div class="msg system">Initializing secure peer-to-peer connection...</div>
</main>

<footer id="input-wrap" class="hidden">
    <div class="input-line">
        <span>&gt;</span>
        <input type="text" id="m-input" placeholder="Enter message..." autofocus>
    </div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect, remove, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhH-mST6_gPbOCJxFhJBe9FSK-iVYPmpw",
        authDomain: "plchat-69b04.firebaseapp.com",
        databaseURL: "https://plchat-69b04-default-rtdb.firebaseio.com",
        projectId: "plchat-69b04",
        storageBucket: "plchat-69b04.firebasestorage.app",
        messagingSenderId: "131639913861",
        appId: "1:131639913861:web:c5c07002169470961668ec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let currentRoomId = null;
    const myId = Math.random().toString(36).substring(7);
    
    const statusEl = document.getElementById('status');
    const flowEl = document.getElementById('chat-flow');
    const inputWrap = document.getElementById('input-wrap');
    const inputEl = document.getElementById('m-input');
    const countEl = document.getElementById('log-count');

    async function startMatch() {
        statusEl.innerHTML = `Protocol: <span class="loading">Searching</span>`;
        const poolRef = ref(db, 'waiting_pool');
        
        const snapshot = await get(poolRef);
        
        if (snapshot.exists()) {
            // 匹配成功：作為第二個加入者
            const waiters = snapshot.val();
            const opponentId = Object.keys(waiters)[0];
            currentRoomId = waiters[opponentId].roomId;
            
            await remove(ref(db, `waiting_pool/${opponentId}`));
            
            // 發送握手信號
            const mRef = ref(db, `rooms/${currentRoomId}/messages`);
            await push(mRef, { sender: "system_sync", text: "ready" });
            
            beginChat(currentRoomId);
        } else {
            // 建立房間：作為第一個等待者
            currentRoomId = `room_${myId}`;
            await set(ref(db, `waiting_pool/${myId}`), { roomId: currentRoomId });
            onDisconnect(ref(db, `waiting_pool/${myId}`)).remove();
            
            // 監聽握手信號
            const syncRef = ref(db, `rooms/${currentRoomId}/messages`);
            const unsubscribe = onValue(syncRef, (snap) => {
                if (snap.exists()) {
                    unsubscribe();
                    beginChat(currentRoomId);
                }
            });
        }
    }

    function beginChat(roomId) {
        statusEl.innerText = "Protocol: Established";
        inputWrap.classList.remove('hidden');
        inputEl.focus();
        
        const roomRef = ref(db, `rooms/${roomId}`);
        onDisconnect(roomRef).remove();

        onValue(roomRef, (snap) => {
            if (!snap.exists()) {
                // 對方離開，自動踢出並重新匹配
                window.location.reload();
                return;
            }
            
            const data = snap.val();
            if (data && data.messages) {
                const msgList = Object.values(data.messages)
                                      .filter(m => m.sender !== "system_sync");
                updateUI(msgList.slice(-30)); // 僅保留最後 30 條
            }
        });
    }

    function updateUI(msgs) {
        flowEl.innerHTML = '';
        msgs.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.sender === myId ? 'me' : 'stranger'}`;
            const label = m.sender === myId ? 'YOU' : 'STRANGER';
            div.innerHTML = `<b>${label}</b> ${m.text}`;
            flowEl.appendChild(div);
        });
        flowEl.scrollTop = flowEl.scrollHeight;
        countEl.innerText = `Log: ${msgs.length}/30`;
    }

    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && inputEl.value.trim() !== '') {
            const mRef = ref(db, `rooms/${currentRoomId}/messages`);
            push(mRef, {
                sender: myId,
                text: inputEl.value,
                ts: serverTimestamp()
            });
            inputEl.value = '';
        }
    });

    // 防止頁面快取導致的邏輯錯誤
    window.onbeforeunload = () => {
        remove(ref(db, `rooms/${currentRoomId}`));
        remove(ref(db, `waiting_pool/${myId}`));
    };

    startMatch();
</script>
</body>
</html>
