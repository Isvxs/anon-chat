<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANON_PROTOCOL // V2</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --border: #f0f0f0;
            --system: #888888;
            --font: 'Builder Sans', 'Inter', -apple-system, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部狀態列：更細緻的邊框 */
        header {
            padding: 18px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 10;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
        }

        /* 聊天區域：改為由下往上 */
        #chat-flow {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse; /* 核心修改：由下往上 */
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* 訊息氣泡與動畫 */
        .msg-wrapper {
            display: flex;
            flex-direction: column;
            animation: msg-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg {
            max-width: 80%;
            padding: 10px 15px;
            font-size: 14.5px;
            line-height: 1.4;
            border-radius: 18px;
            position: relative;
        }

        /* 自己與對方的區分 */
        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.me .msg {
            background-color: var(--fg);
            color: var(--bg);
            border-bottom-right-radius: 4px;
        }

        .msg-wrapper.stranger { align-items: flex-start; }
        .msg-wrapper.stranger .msg {
            background-color: var(--border);
            color: var(--fg);
            border-bottom-left-radius: 4px;
        }

        .msg-wrapper.system {
            align-items: center;
            font-size: 11px;
            color: var(--system);
            margin: 10px 0;
            text-transform: uppercase;
        }

        /* 輸入區域：Instagram 風格懸浮感 */
        footer {
            padding: 20px;
            background: var(--bg);
            transition: transform 0.3s ease;
        }

        footer.hidden { transform: translateY(100%); }

        .input-bar {
            display: flex;
            align-items: center;
            background: var(--border);
            border-radius: 25px;
            padding: 8px 18px;
            gap: 10px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            padding: 8px 0;
        }

        /* 載入動畫 */
        .dot-typing {
            display: inline-flex;
            gap: 3px;
        }
        .dot {
            width: 4px; height: 4px; background: var(--system); border-radius: 50%;
            animation: dot-blink 1.4s infinite both;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

    </style>
</head>
<body>

<header>
    <div id="status">Protocol / <span id="status-text">Synchronizing</span></div>
    <div id="log-count">0/30</div>
</header>

<main id="chat-flow">
    <div class="msg-wrapper system">Waiting for secure handshake...</div>
</main>

<footer id="input-wrap" class="hidden">
    <div class="input-bar">
        <input type="text" id="m-input" placeholder="Type message..." autofocus autocomplete="off">
    </div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect, remove, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhH-mST6_gPbOCJxFhJBe9FSK-iVYPmpw",
        authDomain: "plchat-69b04.firebaseapp.com",
        databaseURL: "https://plchat-69b04-default-rtdb.firebaseio.com",
        projectId: "plchat-69b04",
        storageBucket: "plchat-69b04.firebasestorage.app",
        messagingSenderId: "131639913861",
        appId: "1:131639913861:web:c5c07002169470961668ec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const myId = Math.random().toString(36).substring(7);
    let currentRoomId = null;

    const statusText = document.getElementById('status-text');
    const flowEl = document.getElementById('chat-flow');
    const inputWrap = document.getElementById('input-wrap');
    const inputEl = document.getElementById('m-input');
    const countEl = document.getElementById('log-count');

    async function startMatch() {
        statusText.innerHTML = `Searching <span class="dot-typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>`;
        const poolRef = ref(db, 'waiting_pool');
        const snapshot = await get(poolRef);
        
        if (snapshot.exists()) {
            const waiters = snapshot.val();
            const opponentId = Object.keys(waiters)[0];
            currentRoomId = waiters[opponentId].roomId;
            await remove(ref(db, `waiting_pool/${opponentId}`));
            await push(ref(db, `rooms/${currentRoomId}/messages`), { sender: "sys_sync", text: "1" });
            beginChat(currentRoomId);
        } else {
            currentRoomId = `room_${myId}`;
            await set(ref(db, `waiting_pool/${myId}`), { roomId: currentRoomId });
            onDisconnect(ref(db, `waiting_pool/${myId}`)).remove();
            
            const syncRef = ref(db, `rooms/${currentRoomId}/messages`);
            const unsubscribe = onValue(syncRef, (snap) => {
                if (snap.exists()) {
                    unsubscribe();
                    beginChat(currentRoomId);
                }
            });
        }
    }

    function beginChat(roomId) {
        statusText.innerText = "Established";
        inputWrap.classList.remove('hidden');
        inputEl.focus();
        
        const roomRef = ref(db, `rooms/${roomId}`);
        onDisconnect(roomRef).remove();

        onValue(roomRef, (snap) => {
            if (!snap.exists()) { location.reload(); return; }
            const data = snap.val();
            if (data && data.messages) {
                const msgList = Object.values(data.messages)
                                      .filter(m => m.sender !== "sys_sync");
                updateUI(msgList.slice(-30));
            }
        });
    }

    function updateUI(msgs) {
        // 因為使用了 column-reverse，我們需要反轉陣列來配合顯示順序
        // 但由於 Firebase 的 timestamp 順序，我們反轉它們以確保最新訊息在最下面
        const reversed = [...msgs].reverse(); 
        
        flowEl.innerHTML = '';
        reversed.forEach(m => {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${m.sender === myId ? 'me' : 'stranger'}`;
            wrap.innerHTML = `<div class="msg">${m.text}</div>`;
            flowEl.appendChild(wrap);
        });
        countEl.innerText = `${msgs.length}/30`;
    }

    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && inputEl.value.trim() !== '') {
            push(ref(db, `rooms/${currentRoomId}/messages`), {
                sender: myId,
                text: inputEl.value,
                ts: serverTimestamp()
            });
            inputEl.value = '';
        }
    });

    startMatch();
</script>
</body>
</html>
