<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANON_CHAT_V1</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --accent: #333333;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Builder Sans', 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.5px;
        }

        /* 狀態列 */
        #header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--accent);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
        }

        /* 聊天區域 */
        #chat-flow {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 4px 0;
            line-height: 1.5;
            font-size: 15px;
            word-break: break-all;
        }

        .msg::before {
            content: "> ";
            opacity: 0.5;
        }

        .msg.system { color: #666; font-style: italic; }
        .msg.me { color: var(--fg); }
        .msg.stranger { color: #aaa; }

        /* 輸入區域 */
        #input-container {
            padding: 25px 20px;
            border-top: 1px solid var(--accent);
            display: flex;
            align-items: center;
        }

        #input-container.hidden { display: none; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            caret-color: var(--fg);
        }

        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

<div id="header">
    <span id="status">Status: Initializing...</span>
    <span id="counter">Log: 0/30</span>
</div>

<div id="chat-flow">
    <div class="msg system">system: initializing anonymous protocol...</div>
</div>

<div id="input-container" class="hidden">
    <input type="text" id="m-input" placeholder="Type message..." autocomplete="off">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect, remove, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    console.log("Step 1: Script loaded");

    const firebaseConfig = {
        apiKey: "AIzaSyDhH-mST6_gPbOCJxFhJBe9FSK-iVYPmpw",
        authDomain: "plchat-69b04.firebaseapp.com",
        databaseURL: "https://plchat-69b04-default-rtdb.firebaseio.com",
        projectId: "plchat-69b04",
        storageBucket: "plchat-69b04.firebasestorage.app",
        messagingSenderId: "131639913861",
        appId: "1:131639913861:web:c5c07002169470961668ec"
    };

    try {
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        console.log("Step 2: Firebase App Initialized");

        let currentRoomId = null;
        let myId = Math.random().toString(36).substring(7);
        const statusEl = document.getElementById('status');
        
        async function startMatching() {
            console.log("Step 3: Starting Match, My ID:", myId);
            const waitingRef = ref(db, 'waiting_pool');
            
            try {
                const snapshot = await get(waitingRef);
                console.log("Step 4: Database Connected");
                
                if (snapshot.exists()) {
                    console.log("Step 5: Found someone waiting...");
                    const waiters = snapshot.val();
                    const opponentId = Object.keys(waiters)[0];
                    currentRoomId = waiters[opponentId].roomId;
                    await remove(ref(db, `waiting_pool/${opponentId}`));
                    initChat(currentRoomId);
                } else {
                    console.log("Step 5: No one waiting, creating pool entry...");
                    currentRoomId = `room_${myId}`;
                    await set(ref(db, `waiting_pool/${myId}`), { roomId: currentRoomId });
                    statusEl.innerText = "Status: Waiting for stranger...";
                    
                    const roomRef = ref(db, `rooms/${currentRoomId}/messages`);
                    onValue(roomRef, (snap) => {
                        if (snap.exists()) initChat(currentRoomId);
                    });
                }
            } catch (e) {
                console.error("Database Error:", e);
                statusEl.innerText = "Status: Database Error (Check Rules)";
            }
        }

        function initChat(id) {
            console.log("Step 6: Chat Initiated, Room:", id);
            document.getElementById('input-container').classList.remove('hidden');
            statusEl.innerText = "Status: Connected";
            // ... 後續邏輯同前 ...
        }

        startMatching();
    } catch (err) {
        console.error("Initialization Error:", err);
    }
</script>
</body>
</html>
